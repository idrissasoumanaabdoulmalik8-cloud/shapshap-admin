<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="header" class="admin-header">
    <div class="header-left">
        <div class="header-brand">
            <span class="brand-icon">🌸</span>
            <h1>Shashap Admin</h1>
        </div>
    </div>
    <div class="header-right">
        <div class="header-user">
            <div class="user-avatar">A</div>
            <div class="user-info">
                <span class="user-name">Admin</span>
                <span class="user-role">Administrateur</span>
            </div>
        </div>
    </div>
</div>

<style>
    .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: white;
        border-radius: var(--radius);
        margin-bottom: 24px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(233,30,99,0.05);
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .brand-icon {
        font-size: 28px;
    }

    .header-brand h1 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 22px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--rose), var(--rose-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
        margin: 0;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-user {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 16px 6px 8px;
        border-radius: 25px;
        background: var(--rose-light);
        cursor: pointer;
        transition: var(--transition);
    }

    .header-user:hover {
        background: #f8d7e0;
        transform: scale(1.02);
    }

    .user-avatar {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--rose), var(--rose-dark));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 14px;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(233,30,99,0.3);
    }

    .user-info {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
    }

    .user-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--gray-dark);
    }

    .user-role {
        font-size: 11px;
        color: var(--gray);
    }

    @media (max-width: 768px) {
        .admin-header {
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .header-brand h1 {
            font-size: 18px;
        }
        .brand-icon {
            font-size: 22px;
        }
        .user-info {
            display: none;
        }
        .header-user {
            padding: 4px 12px 4px 6px;
        }
    }

    @media (max-width: 480px) {
        .header-brand h1 {
            font-size: 16px;
        }
        .user-avatar {
            width: 30px;
            height: 30px;
            font-size: 12px;
        }
    }
</style>
</html>
